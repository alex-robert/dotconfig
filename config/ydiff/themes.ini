# Reference: https://en.wikipedia.org/wiki/ANSI_escape_code
# Inspired by VSCode dark theme (nvim vscode.lua color palette)

[vscode]
header          = 38;5;73        # vscBlueGreen fg (#4EC9B0 approx → #5FAFAF)
old_path        = 38;5;180       # vscYellowOrange fg (#D7BA7D approx → #D7AF87)
new_path        = 38;5;180       # vscYellowOrange fg
hunk_header     = 38;5;73        # vscBlueGreen fg
hunk_meta       = 38;5;67        # vscBlue fg (#569CD6 approx → #5F87AF)
common_line     = 0              # Reset
old_line        = 48;5;52        # vscDiffRedDark bg (#4B1818 approx → #5F0000)
new_line        = 48;5;22        # vscDiffGreenDark bg (#373D29 approx → #005F00)
deleted_text    = 48;5;88        # vscDiffRedLight bg (#6F1313 approx → #870000)
inserted_text   = 48;5;65        # vscDiffGreenLight bg (#4B5632 approx → #5F875F)
replaced_old_text = 48;5;88      # same as deleted_text
replaced_new_text = 48;5;65      # same as inserted_text
old_line_number = 38;5;240       # vscLineNumber fg (#5A5A5A approx → #585858)
new_line_number = 38;5;240       # vscLineNumber fg
file_separator  = 38;5;240       # subtle separator
wrap_marker     = 38;5;97        # muted purple fg
