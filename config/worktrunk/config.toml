worktree-path = "~/Workspace/worktrees/{{ repo }}.{{ branch | sanitize }}"

## Hooks

[post-create]
env = "[ -f {{ repo_path }}/.env ] && ln -sf {{ repo_path }}/.env .env || true"
npm = "[ -f bun.lock ] || [ -f bun.lockb ] && bun install || [ -f pnpm-lock.yaml ] && pnpm install || [ -f yarn.lock ] && yarn install || [ -f package-lock.json ] && npm install || true"

## Command config

[list]
# summary = false    # Enable LLM branch summaries (requires [commit.generation])
# full = false       # Show CI, main…± diffstat, and LLM summaries (--full)
branches = true   # Include branches without worktrees (--branches)
remotes = true    # Include remote-only branches (--remotes)

[commit]
# Shared by `wt step commit`, `wt step squash`, and `wt merge`.
stage = "all"      # What to stage before commit: "all", "tracked", or "none"

[merge]
squash = true      # Squash commits into one (--no-squash to preserve history)
commit = true      # Commit uncommitted changes first (--no-commit to skip)
rebase = true      # Rebase onto target before merge (--no-rebase to skip)
remove = true      # Remove worktree after merge (--no-remove to keep)
verify = true      # Run project hooks (--no-verify to skip)

[switch.picker]
pager = "delta --paging=never"

[commit.generation]
command = "copilot --model gpt-5-mini --available-tools='' --no-custom-instructions --silent -p \"$(cat)\""

